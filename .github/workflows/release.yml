# Publishes to PyPI when a version tag (v*) is pushed, via PyPI trusted
# publishing (OIDC) — no tokens stored in the repo.
#
# One-time setup on pypi.org (before the first tag): log in → your account →
# Publishing → "Add a new pending publisher" with:
#   PyPI project name: claude-hop
#   Owner:             SeiduTakizawa
#   Repository:        Claude-hop
#   Workflow name:     release.yml
#   Environment name:  pypi
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - run: uv publish --trusted-publishing always
